<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Formula Vault — FRA Exam Hub</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
<header class="top">
  <div class="row">
    <a class="brand" href="index.html"><span class="logo"></span><span class="brand-label">Financial Reporting<br>&amp; Analysis</span></a>
    <div class="tools">
      <a href="index.html" class="pill-btn">← Home</a>
      <button id="themeBtn" class="pill-btn" onclick="toggleTheme()">☾ Dark</button>
    </div>
  </div>
</header>

<main>
<div class="shell">
  <div class="section-title">
    <h2><em>Formula Vault</em></h2>
    <p>Every formula, identity and journal-entry pattern from your course in one searchable page. Use this to memorise — there's no formula booklet on exam day.</p>
  </div>

  <div style="max-width:680px;margin:0 auto 1.5rem">
    <input type="search" id="search" class="search-bar" placeholder="🔍 Search formulas (e.g. ROA, FIFO, bond, depreciation)…">
  </div>

  <div id="vaultBody"></div>
</div>
</main>

<footer class="bot">Financial Reporting &amp; Analysis · Final Exam Prep</footer>

<script src="js/app.js"></script>
<script src="js/data/manifest.js"></script>
<script src="js/data/chapter_content.js"></script>
<script src="js/data/c_ch1_2.js"  onerror=""></script>
<script src="js/data/c_ch3.js"    onerror=""></script>
<script src="js/data/c_ch4.js"    onerror=""></script>
<script src="js/data/c_ch5.js"    onerror=""></script>
<script src="js/data/c_ch6.js"    onerror=""></script>
<script src="js/data/c_ch7.js"    onerror=""></script>
<script src="js/data/c_ch8.js"    onerror=""></script>
<script src="js/data/c_ch9.js"    onerror=""></script>
<script src="js/data/c_ch10.js"   onerror=""></script>
<script src="js/data/c_ch11.js"   onerror=""></script>
<script src="js/data/c_ch12.js"   onerror=""></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
function buildVault(){
  let html = '';
  MANIFEST.chapters.forEach(c => {
    const data = CHAPTER_CONTENT[c.id];
    if (!data || !data.formulas || !data.formulas.length) return;
    html += `<section class="vault-section" data-chap="${c.id}" data-search="${(c.title + ' ' + c.blurb).toLowerCase()}">
      <h3 style="font-style:italic;margin:2.5rem 0 1rem;border-top:1px solid var(--line);padding-top:1.5rem">
        <span class="muted sans" style="font-size:.85rem;letter-spacing:.12em;text-transform:uppercase">Chapter ${c.num}</span><br>
        ${c.title}
      </h3>`;
    data.formulas.forEach(f => {
      const expr = f.expr ? `<div class="expr">$$${f.expr}$$</div>` : '';
      const inline = f.inline ? `<div class="expr"><strong>${f.inline}</strong></div>` : '';
      const search = (f.name + ' ' + (f.expr||'') + ' ' + (f.inline||'') + ' ' + (f.when||'')).toLowerCase();
      html += `<div class="formula vault-row" data-search="${search.replace(/"/g,'&quot;')}" data-chap="${c.id}">
        <div class="name">${f.name}</div>
        ${expr}${inline}
        <div class="when">${f.when || ''}</div>
      </div>`;
    });
    html += `</section>`;
  });
  document.getElementById('vaultBody').innerHTML = html;
  if (window.renderMathInElement) FRA.renderMath(document.getElementById('vaultBody'));
}

function filterVault(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const rows = document.querySelectorAll('.vault-row');
  let total = 0, shown = 0;
  rows.forEach(r => {
    total++;
    const match = !q || r.dataset.search.includes(q);
    r.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  document.querySelectorAll('.vault-section').forEach(sec => {
    const visible = sec.querySelectorAll('.vault-row:not([style*="display: none"])').length;
    sec.style.display = visible ? '' : 'none';
  });
}

buildVault();
document.getElementById('search').addEventListener('input', filterVault);
</script>
</body>
</html>
