<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chapters — FRA Exam Hub</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="top">
  <div class="row">
    <a class="brand" href="index.html">
      <span class="logo"></span>
      <span class="brand-label">Financial Reporting<br>&amp; Analysis</span>
    </a>
    <div class="tools">
      <a href="index.html" class="pill-btn">← Home</a>
      <button id="themeBtn" class="pill-btn" onclick="toggleTheme()">☾ Dark</button>
    </div>
  </div>
</header>

<main>
<div class="shell">
  <div class="section-title">
    <h2><em>Choose a chapter</em></h2>
    <p>Each chapter explains the topic in plain language with definitions, formulas, derivations, worked examples, memory hooks, and common pitfalls.</p>
  </div>
  <div id="chList" class="ch-list"></div>
</div>
</main>

<footer class="bot">Financial Reporting &amp; Analysis · Final Exam Prep</footer>

<script src="js/app.js"></script>
<script src="js/data/manifest.js"></script>
<script>
function pad(n){ return String(n).padStart(2,'0'); }
function render(){
  const list = document.getElementById('chList');
  list.innerHTML = MANIFEST.chapters.map((c, i)=>{
    return `<a class="ch-row" href="chapter.html?id=${c.id}">
      <div class="num"><em>${pad(i+1)}</em></div>
      <div class="body">
        <h3>${c.title}</h3>
        <p>${c.blurb}</p>
      </div>
      <div class="arrow">→</div>
    </a>`;
  }).join('');
}
render();
</script>
</body>
</html>
